name: Build Flutter APK + Auto Version

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Auto Bump Version
        run: |
          python3 -c '
          import re
          with open("pubspec.yaml", "r") as f:
              content = f.read()
          match = re.search(r"version:\s*(\d+\.\d+\.\d+)\+(\d+)", content)
          if match:
              base = match.group(1)
              build = int(match.group(2)) + 1
              new_ver = f"version: {base}+{build}"
              content = re.sub(r"version:\s*.*", new_ver, content)
              with open("pubspec.yaml", "w") as f:
                  f.write(content)
              print(f"Version updated to {base}+{build}")
          '

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pubspec.yaml
          git diff --staged --quiet || git commit -m "chore: bump version [skip ci]" && git push
        continue-on-error: true

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-flutter-assistant-apk
          path: build/app/outputs/flutter-apk/app-release.apk
